<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freezer Visual Scanner</title>


<script src="https://docs.opencv.org/4.x/opencv.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;
width:95%;
max-width:700px;
margin:auto;
overflow:hidden;
border-radius:20px;

}


video{

width:100%;

}


#target{

position:absolute;

width:32%;
height:18%;

left:34%;
top:43%;

border:4px solid #00ff00;

}



#hasil{

font-size:42px;
margin:20px;

}


#info{

color:#00ff00;
font-size:18px;

}


button{

width:90px;
height:90px;

border-radius:50%;

font-size:40px;

}



canvas{

display:none;

}



</style>


</head>


<body>


<h2>❄️ Freezer Visual Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>




<div id="hasil">
-
</div>



<div id="info">
Tekan kamera
</div>



<button onclick="start()">
📷
</button>



<canvas id="canvas"></canvas>






<script>



const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const hasil =
document.getElementById("hasil");


const info =
document.getElementById("info");



let aktif=false;

let stream=null;



let cvReady=false;



cv['onRuntimeInitialized']=()=>{

cvReady=true;

info.innerHTML="OpenCV siap";

};










function start(){


if(aktif)return;


aktif=true;


scan();


}









async function bukaKamera(){



stream =
await navigator.mediaDevices.getUserMedia({


video:{


facingMode:"environment",


width:{
ideal:1920
},


height:{
ideal:1080
}


}


});



video.srcObject=stream;



await new Promise(r=>{

video.onloadedmetadata=r;

});


}










function tutupKamera(){


if(stream){


stream
.getTracks()
.forEach(t=>t.stop());


stream=null;


}


video.srcObject=null;


}









async function scan(){



while(aktif){



let suhu=null;



while(!suhu){



info.innerHTML=
"📷 Membuka kamera";


await bukaKamera();



await sleep(1000);



info.innerHTML=
"🔍 Analisis visual";




suhu =
ambilGambar();



tutupKamera();





if(!suhu){


info.innerHTML=
"⚠️ Tidak terbaca, ulang";


await sleep(800);


}


}






hasil.innerHTML =
"Suhu : "+suhu+"°C";



info.innerHTML =
"✅ Terbaca";


kirimSheet(suhu);





await sleep(60000);



info.innerHTML =
"⏳ Menunggu";



}




}









function ambilGambar(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);







let src =
cv.imread(canvas);





// crop display


let x =
Math.floor(src.cols*0.34);


let y =
Math.floor(src.rows*0.43);


let w =
Math.floor(src.cols*0.32);


let h =
Math.floor(src.rows*0.18);



let rect =
new cv.Rect(
x,
y,
w,
h
);



let crop =
src.roi(rect);





// grayscale


let gray =
new cv.Mat();


cv.cvtColor(

crop,

gray,

cv.COLOR_RGBA2GRAY

);





// naikkan kontras


cv.equalizeHist(

gray,

gray

);






// threshold


let binary =
new cv.Mat();



cv.threshold(

gray,

binary,

120,

255,

cv.THRESH_BINARY

);








let contours =
new cv.MatVector();


let hierarchy =
new cv.Mat();





cv.findContours(

binary,

contours,

hierarchy,

cv.RETR_EXTERNAL,

cv.CHAIN_APPROX_SIMPLE

);







let boxes=[];





for(
let i=0;
i<contours.size();
i++
){



let cnt =
contours.get(i);



let r =
cv.boundingRect(cnt);




if(

r.height>15 &&

r.width>5

){


boxes.push(r);


}


}







boxes.sort(
(a,b)=>a.x-b.x
);





let angka="";





boxes.forEach(r=>{



let ratio =
r.height/r.width;




// bentuk digit



if(ratio>3){

angka+="1";


}

else if(
ratio>1.6 &&
ratio<2.8
){

angka+="7";


}

else if(
ratio>=1 &&
ratio<=1.6
){

angka+="9";


}

else{


angka+="0";


}



});








// buang jika tidak masuk suhu



if(

angka.length==2 &&

angka!="00"

){



return "-"+angka;



}





return null;




}









function kirimSheet(suhu){


fetch(

SHEET_URL,

{


method:"POST",

mode:"no-cors",


body:JSON.stringify({

suhu:suhu,

waktu:new Date().toLocaleString()

})


}

);


}









function sleep(ms){

return new Promise(

r=>setTimeout(r,ms)

);

}





</script>


</body>

</html>
