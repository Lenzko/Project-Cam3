<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freezer Temperature Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;
width:95%;
max-width:700px;
margin:auto;
overflow:hidden;
border-radius:20px;

}


video{
width:100%;
}



#target{

position:absolute;

width:35%;
height:18%;

left:32.5%;
top:42%;

border:4px solid #00ff00;

box-sizing:border-box;

}



#hasil{

font-size:42px;
margin:20px;

}



#info{

color:#00ff00;
font-size:18px;

}



button{

width:90px;
height:90px;

font-size:40px;

border-radius:50%;

}



canvas{
display:none;
}


</style>


</head>


<body>


<h2>❄️ Freezer Temp Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>




<div id="hasil">
-
</div>



<div id="info">
Tekan kamera
</div>



<button onclick="start()">
📷
</button>



<canvas id="canvas"></canvas>





<script>



const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const hasil =
document.getElementById("hasil");


const info =
document.getElementById("info");



let worker;

let aktif=false;

let streamCamera=null;







async function start(){


if(aktif)return;



aktif=true;



worker =
await Tesseract.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789-.C"


});



info.innerHTML =
"Scanner aktif";


scan();


}










async function bukaKamera(){


streamCamera =
await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment",

width:{
ideal:1920
},

height:{
ideal:1080
}

}

});



video.srcObject =
streamCamera;



await new Promise(resolve=>{

video.onloadedmetadata=resolve;

});


}







function matikanKamera(){


if(streamCamera){


streamCamera
.getTracks()
.forEach(t=>t.stop());


streamCamera=null;


}



video.srcObject=null;


}









async function scan(){



while(aktif){



let mulai =
Date.now();



let suhu=null;



while(!suhu){



await bukaKamera();


await sleep(1000);



for(let i=0;i<3;i++){



info.innerHTML =
"🔍 Scan suhu "+(i+1)+"/3";



let r =
await capture();



if(r){


suhu=r;

break;


}


await sleep(300);



}




matikanKamera();




if(!suhu){


info.innerHTML =
"⚠️ Tidak terbaca ulang";


await sleep(500);


}



}





hasil.innerHTML =
"Suhu : "+suhu.angka+"°C";



info.innerHTML =
"📤 Kirim data";



sendSheet(suhu);







let waktu =
Date.now()-mulai;



let tunggu =
60000-waktu;



if(tunggu<1000)
tunggu=1000;



await sleep(tunggu);



info.innerHTML =
"⏳ Menunggu scan berikutnya";



}




}









async function capture(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);








// crop display suhu


let crop =
document.createElement("canvas");


let c =
crop.getContext("2d");



let w =
canvas.width*0.35;


let h =
canvas.height*0.18;



crop.width=w;

crop.height=h;



c.drawImage(

canvas,


canvas.width*0.325,

canvas.height*0.42,


w,
h,


0,
0,

w,
h

);










// proses LED display


let img =
c.getImageData(

0,

0,

w,

h

);



let d =
img.data;



for(
let i=0;
i<d.length;
i+=4
){


let gray =

0.299*d[i]+
0.587*d[i+1]+
0.114*d[i+2];




// konversi LED putih

if(gray>110){

gray=255;

}else{

gray=0;

}



d[i]=gray;

d[i+1]=gray;

d[i+2]=gray;


}





c.putImageData(

img,

0,

0

);








// perbesar


let big =
document.createElement("canvas");



big.width =
crop.width*6;


big.height =
crop.height*6;



let b =
big.getContext("2d");



b.imageSmoothingEnabled=false;



b.drawImage(

crop,

0,

0,

big.width,

big.height

);









let data =
await worker.recognize(big);





let text =
data.data.text;





console.log(text);







// bersihkan OCR


let suhu =

text

.replace(/O/g,"0")

.replace(/I/g,"1")

.replace(/[^0-9\-]/g,"");







// validasi freezer


if(

suhu.startsWith("-") &&

suhu.length>=3 &&

suhu.length<=4 &&

data.data.confidence>=70

){



return {


angka:suhu,

confidence:data.data.confidence


};



}







return null;



}









function sendSheet(data){


fetch(

SHEET_URL,

{

method:"POST",

mode:"no-cors",

body:JSON.stringify({

suhu:data.angka,

confidence:data.confidence,

waktu:new Date().toLocaleString()

})

}

);



}







function sleep(ms){

return new Promise(

r=>setTimeout(r,ms)

);

}




</script>



</body>

</html>
