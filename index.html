<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freezer LED Scanner</title>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;
width:95%;
max-width:700px;
margin:auto;
border-radius:20px;
overflow:hidden;

}


video{

width:100%;

}



#target{

position:absolute;

left:34%;
top:43%;

width:32%;
height:18%;

border:4px solid #00ff00;

box-sizing:border-box;

}



#hasil{

font-size:40px;
margin:20px;

}


#info{

color:#00ff00;

}



button{

width:90px;
height:90px;
font-size:40px;
border-radius:50%;

}


canvas{

display:none;

}

</style>

</head>


<body>


<h2>❄️ Freezer LED Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>



<div id="hasil">-</div>


<div id="info">
Siap
</div>



<button onclick="start()">
📷
</button>



<canvas id="canvas"></canvas>






<script>



const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



let video =
document.getElementById("video");


let canvas =
document.getElementById("canvas");


let hasil =
document.getElementById("hasil");


let info =
document.getElementById("info");



let stream=null;

let aktif=false;







function start(){


if(aktif)return;


aktif=true;


loop();


}








async function bukaCamera(){


stream =
await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment",

width:{
ideal:1920
},

height:{
ideal:1080
}

}

});



video.srcObject=stream;



await new Promise(r=>{

video.onloadedmetadata=r;

});


}








function tutupCamera(){


if(stream){


stream
.getTracks()
.forEach(t=>t.stop());


stream=null;


}


video.srcObject=null;


}









async function loop(){



while(aktif){



let nilai=null;



while(!nilai){



info.innerHTML=
"📷 buka kamera";


await bukaCamera();



await sleep(1000);



info.innerHTML=
"🔍 analisis LED";



nilai =
ambilFoto();



tutupCamera();





if(!nilai){


info.innerHTML=
"❌ gagal ulang";


await sleep(1000);


}



}







hasil.innerHTML =
"Suhu : "+nilai+"°C";


info.innerHTML =
"✅ berhasil";



kirim(nilai);




await sleep(60000);



}



}









function ambilFoto(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);





let src =
cv.imread(canvas);





// crop display



let x =
src.cols*0.34;


let y =
src.rows*0.43;


let w =
src.cols*0.32;


let h =
src.rows*0.18;



let crop =
src.roi(

new cv.Rect(
x,y,w,h
)

);








// ===== HSV ANALYSIS =====



let rgb =
new cv.Mat();



cv.cvtColor(

crop,

rgb,

cv.COLOR_RGBA2RGB

);



let hsv =
new cv.Mat();



cv.cvtColor(

rgb,

hsv,

cv.COLOR_RGB2HSV

);







// cari pixel LED terang

let low =
new cv.Mat(
hsv.rows,
hsv.cols,
hsv.type(),
[0,0,130,0]
);



let high =
new cv.Mat(
hsv.rows,
hsv.cols,
hsv.type(),
[180,150,255,255]
);





let mask =
new cv.Mat();





cv.inRange(

hsv,

low,

high,

mask

);







// hilangkan noise


let kernel =
cv.Mat.ones(

3,

3,

cv.CV_8U

);



cv.morphologyEx(

mask,

mask,

cv.MORPH_CLOSE,

kernel

);







let contours =
new cv.MatVector();



let hierarchy =
new cv.Mat();




cv.findContours(

mask,

contours,

hierarchy,

cv.RETR_EXTERNAL,

cv.CHAIN_APPROX_SIMPLE

);








let box=[];





for(
let i=0;
i<contours.size();
i++
){


let c =
contours.get(i);



let r =
cv.boundingRect(c);





if(

r.height>15 &&

r.width>3

){


box.push(r);


}


}





box.sort(
(a,b)=>a.x-b.x
);





console.log(box);






let angka="";





box.forEach(r=>{



let ratio =
r.height/r.width;





if(
ratio>2.8
){

angka+="1";


}

else if(
ratio>1.7
){

angka+="7";


}

else if(
ratio>1.1
){

angka+="9";


}

else{


angka+="0";


}



});







// validasi freezer


if(

angka.length==2 &&

angka!="00"

){


return "-"+angka;


}




return null;



}








function kirim(suhu){


fetch(

SHEET_URL,

{


method:"POST",

mode:"no-cors",

body:JSON.stringify({

suhu:suhu,

waktu:new Date().toLocaleString()

})


}

);


}






function sleep(ms){

return new Promise(

r=>setTimeout(r,ms)

);

}




</script>


</body>

</html>
