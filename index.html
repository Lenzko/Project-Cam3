<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freezer Visual Scanner</title>


<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}


.camera{

position:relative;
width:95%;
max-width:700px;
margin:auto;
overflow:hidden;
border-radius:20px;

}


video{
width:100%;
}


#target{

position:absolute;

width:30%;
height:16%;

left:35%;
top:45%;

border:4px solid #00ff00;

}


#hasil{

font-size:40px;
margin:20px;

}


#info{

color:#00ff00;

}


button{

width:90px;
height:90px;
border-radius:50%;
font-size:40px;

}


canvas{
display:none;
}


</style>

</head>


<body>


<h2>❄️ Freezer Visual Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>



<div id="hasil">
-
</div>


<div id="info">
Tekan kamera
</div>


<button onclick="start()">
📷
</button>


<canvas id="canvas"></canvas>





<script>


const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const hasil =
document.getElementById("hasil");


const info =
document.getElementById("info");



let aktif=false;

let stream=null;







function start(){


if(aktif)return;


aktif=true;


scan();


}








async function openCamera(){


stream =
await navigator.mediaDevices.getUserMedia({


video:{


facingMode:"environment",


width:{
ideal:1920
},


height:{
ideal:1080
}


}


});



video.srcObject=stream;



await new Promise(r=>{

video.onloadedmetadata=r;

});



}







function closeCamera(){


if(stream){


stream
.getTracks()
.forEach(t=>t.stop());


stream=null;


}


video.srcObject=null;


}










async function scan(){



while(aktif){



let suhu=null;



while(!suhu){



info.innerHTML=
"📷 Membuka kamera";



await openCamera();


await sleep(800);



info.innerHTML=
"🔍 Analisis visual";



for(let i=0;i<3;i++){



suhu =
capture();



if(suhu)
break;



await sleep(300);


}



closeCamera();




if(!suhu){


info.innerHTML=
"⚠️ Tidak terbaca ulang";


await sleep(500);


}



}






hasil.innerHTML=
"Suhu : "+suhu+"°C";



info.innerHTML=
"✅ Terbaca";


sendSheet(suhu);




await sleep(60000);



info.innerHTML=
"⏳ Menunggu scan";



}



}









function capture(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);






// crop display


let crop =
document.createElement("canvas");


let c =
crop.getContext("2d");



let w =
canvas.width*0.30;


let h =
canvas.height*0.16;



crop.width=w;

crop.height=h;



c.drawImage(

canvas,


canvas.width*0.35,

canvas.height*0.45,


w,
h,


0,
0,

w,
h

);







// ubah LED jadi putih


let img =
c.getImageData(

0,

0,

w,

h

);



let d =
img.data;



for(
let i=0;
i<d.length;
i+=4
){


let gray =
0.299*d[i]+
0.587*d[i+1]+
0.114*d[i+2];



let v =
gray>110?255:0;



d[i]=v;
d[i+1]=v;
d[i+2]=v;


}



c.putImageData(
img,
0,
0
);






let angka =
detectDisplay(crop);



if(
angka
){


return "-"+angka;


}



return null;



}









function detectDisplay(cv){


let ctx =
cv.getContext("2d");


let w =
cv.width;


let h =
cv.height;



let result="";



// ambil 2 digit utama

for(
let i=0;i<2;i++
){



let digit =
readDigit(

ctx,

i*w/2,

0,

w/2,

h

);



result += digit;



}



if(
result.length==2
)

return result;



return "";

}









function readDigit(
ctx,
x,y,w,h
){



let seg={



a:[0.5,0.18],

b:[0.82,0.35],

c:[0.82,0.65],

d:[0.5,0.82],

e:[0.18,0.65],

f:[0.18,0.35],

g:[0.5,0.5]


};



let on=[];



for(
let s in seg
){


let px =
x+w*seg[s][0];


let py =
h*seg[s][1];



let data =
ctx.getImageData(

px-6,

py-6,

12,

12

);



let count=0;



for(
let i=0;
i<data.data.length;
i+=4
){


if(
data.data[i]>200
)

count++;


}



if(count>25)

on.push(s);



}







let key =
on.sort().join("");





let table={


"abcdef":"0",

"bc":"1",

"abdeg":"2",

"abcdg":"3",

"bcfg":"4",

"acdfg":"5",

"acdefg":"6",

"abc":"7",

"abcdefg":"8",

"abcdfg":"9"



};





return table[key] || "";

}









function sendSheet(suhu){



fetch(

SHEET_URL,

{


method:"POST",

mode:"no-cors",


body:JSON.stringify({

suhu:suhu,

waktu:new Date().toLocaleString()

})


}

);


}







function sleep(ms){

return new Promise(
r=>setTimeout(r,ms)
);

}



</script>


</body>

</html>
