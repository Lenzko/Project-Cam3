<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer LED Scanner</title>
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .camera {
            position: relative;
            width: 95%;
            max-width: 700px;
            margin: auto;
            border-radius: 20px;
            overflow: hidden;
        }

        video {
            width: 100%;
        }

        #target {
            position: absolute;
            left: 34%;
            top: 43%;
            width: 32%;
            height: 18%;
            border: 4px solid #00ff00;
            box-sizing: border-box;
        }

        #hasil {
            font-size: 40px;
            margin: 20px;
        }

        #info {
            color: #00ff00;
        }

        button {
            width: 90px;
            height: 90px;
            font-size: 40px;
            border-radius: 50%;
            background-color: #222;
            color: white;
            border: 2px solid #00ff00;
            cursor: pointer;
        }
        
        button:active {
            background-color: #00ff00;
        }

        canvas {
            display: none;
        }
    </style>
</head>

<body>

    <h2>❄️ Freezer LED Scanner</h2>

    <div class="camera">
        <video id="video" autoplay playsinline></video>
        <div id="target"></div>
    </div>

    <div id="hasil">-</div>
    <div id="info">Siap</div>

    <button onclick="start()">📷</button>

    <canvas id="canvas"></canvas>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";

        let video = document.getElementById("video");
        let canvas = document.getElementById("canvas");
        let hasil = document.getElementById("hasil");
        let info = document.getElementById("info");

        let stream = null;
        let aktif = false;

        function start() {
            if (aktif) return;
            aktif = true;
            loop();
        }

        async function bukaCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                await new Promise(r => {
                    video.onloadedmetadata = r;
                });
            } catch (err) {
                console.error("Gagal membuka kamera: ", err);
                info.innerHTML = "❌ Izin kamera ditolak";
            }
        }

        function tutupCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            video.srcObject = null;
        }

        async function loop() {
            while (aktif) {
                let nilai = null;

                while (!nilai) {
                    info.innerHTML = "📷 membuka kamera...";
                    await bukaCamera();
                    await sleep(1500); // Beri waktu kamera auto-focus

                    info.innerHTML = "🔍 menganalisis LED...";
                    nilai = ambilFoto();
                    tutupCamera();

                    if (!nilai) {
                        info.innerHTML = "❌ gagal mendeteksi, mengulang...";
                        await sleep(2000);
                    }
                }

                hasil.innerHTML = "Suhu : " + nilai + "°C";
                info.innerHTML = "✅ berhasil dikirim";

                kirim(nilai);

                // Tunggu 1 menit sebelum pemindaian berikutnya
                await sleep(60000);
            }
        }

        function ambilFoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            let ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Cek apakah OpenCV sudah siap
            if (typeof cv === 'undefined' || !cv.Mat) {
                console.warn("OpenCV.js belum sepenuhnya siap.");
                return null;
            }

            let src = cv.imread(canvas);

            // 1. Crop area berdasarkan koordinat box target
            let x = src.cols * 0.34;
            let y = src.rows * 0.43;
            let w = src.cols * 0.32;
            let h = src.rows * 0.18;

            let crop = src.roi(new cv.Rect(x, y, w, h));

            // 2. Preprocessing (Ubah ke Grayscale & Thresholding Biner)
            let gray = new cv.Mat();
            cv.cvtColor(crop, gray, cv.COLOR_RGBA2GRAY);
            
            let thresh = new cv.Mat();
            // Ambang batas 170-180 sangat cocok untuk mengisolasi segmen LED putih terang
            cv.threshold(gray, thresh, 175, 255, cv.THRESH_BINARY);

            // Menghilangkan noise bintik kecil
            let kernel = cv.Mat.ones(3, 3, cv.CV_8U);
            cv.morphologyEx(thresh, thresh, cv.MORPH_CLOSE, kernel);

            // 3. Deteksi Kontur Karakter
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let box = [];

            for (let i = 0; i < contours.size(); i++) {
                let c = contours.get(i);
                let r = cv.boundingRect(c);

                // Filter Karakter Utama: 
                // Deteksi angka (tinggi harus cukup besar) ATAU tanda minus (lebar > tinggi, tapi tipis)
                let isAngka = (r.height > h * 0.25);
                let isMinus = (r.width > h * 0.2 && r.height >= 4 && r.width > r.height);

                if (isAngka || isMinus) {
                    // Proteksi tambahan: Abaikan indikator hati/love yang berada di area paling atas (y < 15% dari tinggi crop)
                    if (r.y > h * 0.15 || r.height > h * 0.5) {
                        box.push(r);
                    }
                }
            }

            // Urutkan objek terdeteksi dari kiri ke kanan berdasarkan koordinat X
            box.sort((a, b) => a.x - b.x);

            let angka = "";
            let punyaMinus = false;

            box.forEach(r => {
                let ratio = r.height / r.width;

                // A. Deteksi Tanda Minus (-) -> Jika bentuknya horizontal pipih
                if (r.width > r.height && ratio < 0.8) {
                    punyaMinus = true;
                    return; 
                }

                // B. Klasifikasi Angka Berdasarkan Rasio Aspek Segmen LED
                if (ratio > 2.4) {
                    angka += "1";
                } else if (ratio > 1.3 && ratio <= 2.4) {
                    // Memisahkan angka 7 dan 9 berdasarkan batas threshold rasio font LED standar
                    if (ratio >= 1.55 && ratio <= 1.95) {
                        angka += "7";
                    } else {
                        angka += "9";
                    }
                } else if (ratio >= 0.8 && ratio <= 1.3) {
                    angka += "0";
                }
            });

            // Pembersihan Memori OpenCV (PENTING agar browser tidak kehabisan RAM/Crash)
            src.delete(); crop.delete(); gray.delete(); 
            thresh.delete(); kernel.delete(); contours.delete(); hierarchy.delete();

            // 4. Validasi Akhir
            // Jika berhasil menangkap minimal 2 digit angka (contoh: "79")
            if (angka.length >= 2) {
                return (punyaMinus ? "-" : "") + angka;
            }

            return null;
        }

        function kirim(suhu) {
            fetch(SHEET_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    suhu: suhu,
                    waktu: new Date().toLocaleString()
                })
            }).catch(err => console.error("Gagal mengirim data ke Google Sheets:", err));
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }
    </script>
</body>

</html>
